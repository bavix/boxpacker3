version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      npm:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(go-deps)"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci(deps)"
